name: Update Release Manifest

on:
  push:
    branches: [otzaria]
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-manifest:
    name: Generate release assets JSON
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: otzaria

      - name: Generate release manifest JSON
        run: |
          set -euo pipefail

          echo "Fetching all releases..."

          # `gh release view` (no args) → the "Latest" release. With no releases
          # (or only pre-releases) the call fails; leave `latest` null.
          if LATEST_JSON=$(gh release view --json tagName,name,publishedAt,assets 2>/dev/null); then
            LATEST_ARG=(--argjson latest "$LATEST_JSON")
          else
            LATEST_ARG=(--argjson latest null)
          fi

          # All releases for history ([] when none exist).
          ALL_RELEASES=$(gh release list --json tagName,name,publishedAt --limit 100)

          GENERATED_AT=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          jq -n \
             --arg generatedAt "$GENERATED_AT" \
             "${LATEST_ARG[@]}" \
             --argjson releases "$ALL_RELEASES" \
             '{generatedAt: $generatedAt, latest: $latest, releases: $releases}' \
             > release-manifest.json

          echo "Generated release-manifest.json:"
          cat release-manifest.json

      - name: Commit and push manifest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add release-manifest.json

          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update release manifest [skip ci]"
            git push
          fi
